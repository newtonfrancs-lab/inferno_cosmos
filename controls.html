<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controls - Inferno Cosmos</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb1"></div>
    <div class="navbar">
        <div class="logo">INFERNO COSMOS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="Game.html">Play</a>
        </div>
    </div>

    <section class="hero">
        <h1>SYSTEM MANUAL</h1>
        <div class="card-container">
            <div class="card">
                <h3>⌨️ Desktop</h3>
                <p>Arrows: Navigation</p>
                <p>Space: Fire Weapon</p>
            </div>
            <div class="card">
                <h3>📱 Mobile</h3>
                <p>Drag: Move Jet</p>
                <p>Tap: Fire Weapon</p>
            </div>
            <div class="card" style="border-color: #ff4d4d;">
                <h3>⚠️ Warning</h3>
                <p>Avoid collisions. Hull breach is fatal.</p>
            </div>
        </div>
    </section>
</body>
</html>
