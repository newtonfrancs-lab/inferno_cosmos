<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combat - Inferno Cosmos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="stars"></div>

    <div class="hud-container">
        <div class="hud-item">
            <span class="hud-label">Tactical Score</span>
            <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-item" style="border-top-color: var(--neon-red);">
            <span class="hud-label" style="color: var(--neon-red);">Hull Integrity</span>
            <span class="hud-value" id="lives">3</span>
        </div>
    </div>

    <div class="gameArea" id="gameArea">
        <div class="jet" id="jet"></div>
        <div id="game-overlay-msg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
