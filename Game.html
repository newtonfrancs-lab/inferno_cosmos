<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFERNO COSMOS | Combat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="stars"></div>
    <div class="warp-drive"></div>

    <div class="hud-container">
        <div class="hud-item cyan-border">
            <span class="hud-label">SCORE</span>
            <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-item red-border">
            <span class="hud-label">HULL</span>
            <span class="hud-value" id="lives">3</span>
        </div>
    </div>

    <div class="gameArea" id="gameArea">
        <div class="jet" id="jet"></div>
        <div id="game-overlay-msg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
