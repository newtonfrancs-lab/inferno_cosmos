<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFERNO COSMOS | Combat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="stars"></div>

    <nav class="navbar">
        <div class="logo">INFERNO COSMOS</div>
        <div class="nav-links"><a href="index.html">Abort Mission</a></div>
    </nav>

    <div class="hud-container">
        <div class="hud-item" style="border-top: 3px solid #00f7ff;">
            <span class="hud-label">TACTICAL SCORE</span>
            <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-item" style="border-top: 3px solid #ff4d4d;">
            <span class="hud-label" style="color: #ff4d4d;">HULL INTEGRITY</span>
            <span class="hud-value" id="lives">3</span>
        </div>
    </div>

    <div class="gameArea" id="gameArea">
        <div class="jet" id="jet">🚀</div>
        <div id="game-overlay-msg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
