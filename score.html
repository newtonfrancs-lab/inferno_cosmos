<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records - Inferno Cosmos</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb2"></div>
    <div class="navbar">
        <div class="logo">INFERNO COSMOS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="Game.html">Play</a>
        </div>
    </div>

    <section class="hero">
        <h1 style="font-size: 50px;">GALACTIC RECORDS</h1>
        <div class="card" style="margin: 40px auto; max-width: 450px;">
            <p style="font-size: 12px; letter-spacing: 3px; color: cyan; text-transform: uppercase;">Personal Best</p>
            <h2 id="highScore" style="font-size: 80px; margin: 10px 0;">0</h2>
            <p id="rank-text" style="font-style: italic; color: #ccc;">Status: Scanning...</p>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <a href="game.html" style="text-decoration: none;">
                <button class="cta-btn">RE-DEPLOY</button>
            </a>
            <button onclick="resetScore()" style="background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 10px; border-radius: 20px; font-family: 'Orbitron'; cursor: pointer;">WIPE DATA</button>
        </div>
    </section>

    <script>
        let highScore = localStorage.getItem("highScore") || 0;
        document.getElementById("highScore").innerText = highScore;
        const rankText = document.getElementById("rank-text");
        if (highScore >= 50) rankText.innerText = "Rank: Galactic Legend";
        else if (highScore >= 20) rankText.innerText = "Rank: Veteran Striker";
        else rankText.innerText = "Rank: Rookie Pilot";

        function resetScore() {
            if(confirm("Delete records?")) {
                localStorage.setItem("highScore", 0);
                location.reload();
            }
        }
    </script>
</body>
</html>
